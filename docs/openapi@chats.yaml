openapi: 3.1.1
info:
  title: Chats API
  version: "1.0"
  description: Manage chats, members and messages
paths:
  /api/v1/chats:
    post:
      tags:
      - Chats
      summary: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRequest"
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDto"
      security:
      - jwt: []
    get:
      tags:
      - Chats
      summary: ""
      parameters:
      - name: page
        in: query
        schema:
          type: string
      - name: size
        in: query
        schema:
          type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                - content
                - page
                - size
                - total
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatDto"
                  page:
                    type: integer
                  size:
                    type: integer
                  total:
                    type: integer
      security:
      - jwt: []
  /api/v1/chats/{chat_id}:
    put:
      tags:
      - Chats
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditChatRequest"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDto"
      security:
      - jwt: []
    delete:
      tags:
      - Chats
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: ""
      security:
      - jwt: []
    get:
      tags:
      - Chats
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDto"
      security:
      - jwt: []
    patch:
      tags:
      - Chats
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditChatRequest"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDto"
      security:
      - jwt: []
  /api/v1/chats/{chat_id}/members:
    get:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: string
      - name: size
        in: query
        schema:
          type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                - content
                - page
                - size
                - total
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatMemberDto"
                  page:
                    type: integer
                  size:
                    type: integer
                  total:
                    type: integer
      security:
      - jwt: []
  /api/v1/chats/{chat_id}/members/me:
    delete:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: ""
      security:
      - jwt: []
    get:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMemberDto"
      security:
      - jwt: []
  /api/v1/chats/{chat_id}/members/{member_id}:
    post:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      - name: member_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: ""
      security:
      - jwt: []
    delete:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      - name: member_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: ""
      security:
      - jwt: []
    get:
      tags:
      - Chat Members
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      - name: member_id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMemberDto"
      security:
      - jwt: []
  /api/v1/chats/{chat_id}/messages:
    post:
      tags:
      - Chat Messages
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageDto"
      security:
      - jwt: []
    get:
      tags:
      - Chat Messages
      summary: ""
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
